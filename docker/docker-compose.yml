services:
  web:
    build: 
      context: ..
      dockerfile: docker/Dockerfile
    container_name: share-website-django
    restart: always
    ports:
      - "8080:8080"
    
    volumes:
      - ../db.sqlite3:/app/db.sqlite3
      - ../uploads:/app/uploads
    
    environment:
      - DEBUG=False
      - ALLOWED_HOSTS=*
      - SECRET_KEY=django-insecure-production-key-change-this

    command: sh -c "python manage.py collectstatic --noinput && python manage.py runserver 0.0.0.0:8080 --insecure"